<!DOCTYPE html>
<head>
<title>Calculator</title>
<script>
    function add() {
     var m1=numm1.value;
     var m2=numm2.value;

     m1=parseFloat(m1);
     m2=parseFloat(m2);

     var add=m1 + m2;
    
    
     numres.value=add;
    }
     function sub() {
     var m1=numm1.value;
     var m2=numm2.value;

     m1=parseFloat(m1);
     m2=parseFloat(m2);

     var sub=m1 - m2;
    
    
     numres.value=sub;
    
     }
     function mul() {
     var m1=numm1.value;
     var m2=numm2.value;

     m1=parseFloat(m1);
     m2=parseFloat(m2);

     var mul=m1 * m2;
    
    
     numres.value=mul;
     }
     function div() {
     var m1=numm1.value;
     var m2=numm2.value;

     m1=parseFloat(m1);
     m2=parseFloat(m2);

     var div=m1 / m2;
    
    
     numres.value=div;
     }
     function remain() {
     var m1=numm1.value;
     var m2=numm2.value;

     m1=parseFloat(m1);
     m2=parseFloat(m2);

     var remain=m1 % m2;
    
    
     numres.value=remain;
    
    
     }

</script>
</head>
<table border="1">
    <tr>
        <td>
            First Number
        </td>
    <td>
    <input
    type="number" id="numm1" steps="any"
    placeholder="numfn" />
    </td>
</tr>


<tr>
        <td>
            Second Number
        </td>
    <td>
    <input
    type="number" id="numm2" steps="any"
    placeholder="numsn" />
    </td>
</tr>



<tr>
        <td>
            Result
        </td>
    <td>
    <input
    type="number" id="numres" steps="any"
    placeholder="numres" readonly="readonly" />
    </td>
</tr>

<tr>
    <td>
        <input type="button" value="Clear" onclick="location.href='calc.html';">
        </td>
        <td>
            <input type="button" value="+" onclick="add();">
            <input type="button" value="-" onclick="sub();">
            <input type="button" value="x" onclick="mul();">
            <input type="button" value="/" onclick="div();">
            <input type="button" value="%" onclick="remain();">
            </td>
            </tr>
</table>
